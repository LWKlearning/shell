<script>
function showLWKPopup() {
    const popup = document.createElement("div");
    popup.style = `
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
    `;

    popup.innerHTML = `
        <div style="
            background:black;
            color:#00aaff;
            border:3px solid #00aaff;
            padding:30px 40px;
            max-width:600px;
            text-align:center;
            font-family:Courier New, monospace;
            box-shadow:0 0 20px #00aaff;
        ">
            <div style="font-size:26px;margin-bottom:20px;">
                Heads up 👀
            </div>
            <div style="font-size:20px;line-height:1.5;">
                Keep in mind you can use <b>lwklearning chat</b> to join a server with a friend
                in another period!<br><br>
                Just make sure you are both online on the chat.
            </div>
            <button id="lwkPopupBtn" style="
                margin-top:25px;
                padding:12px 30px;
                font-size:20px;
                background:transparent;
                border:2px solid #00aaff;
                color:#00aaff;
                cursor:pointer;
            ">Got it</button>
        </div>
    `;

    document.body.appendChild(popup);
    document.getElementById("lwkPopupBtn").onclick = () => popup.remove();
}
</script>
<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden; /* Prevents double scrollbars */
        }
        iframe {
            border: none;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <iframe src="https://humanorganising.org/" allowfullscreen></iframe>
</body>
</html>
